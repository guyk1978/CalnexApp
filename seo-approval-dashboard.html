<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO draft approval | CalnexApp</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <style>
      .seo-dash-wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }
      .seo-draft-card {
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .seo-draft-card__head {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .seo-draft-card__title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
      }
      .seo-draft-card__slug {
        font-size: 0.85rem;
        color: #5f6b7a;
        margin: 0.25rem 0 0;
      }
      .seo-draft-card__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .status-badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
      }
      .status-badge--pending {
        background: #fef3c7;
        color: #92400e;
      }
      .status-badge--approved {
        background: #d1fae5;
        color: #065f46;
      }
      .status-badge--rejected {
        background: #fee2e2;
        color: #991b1b;
      }
      .seo-toast-host {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .seo-toast {
        background: #111827;
        color: #f9fafb;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        max-width: 320px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        animation: seoToastIn 0.2s ease;
      }
      .seo-toast--err {
        background: #7f1d1d;
      }
      @keyframes seoToastIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .seo-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        z-index: 1500;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .seo-modal-backdrop.is-open {
        display: flex;
      }
      .seo-modal {
        background: #fff;
        border-radius: 12px;
        max-width: 900px;
        width: 100%;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }
      .seo-modal__head {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }
      .seo-modal__body {
        padding: 1rem 1.25rem;
        overflow: auto;
        font-size: 0.8rem;
      }
      .seo-modal__body pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .muted-note {
        color: #5f6b7a;
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a href="/" class="brand">CalnexApp</a>
        <nav class="menu">
          <a href="/" data-nav-link>Home</a>
          <a href="/blog/" data-nav-link>Blog</a>
          <a href="/seo/latest/" data-nav-link>SEO pages</a>
        </nav>
      </div>
    </header>

    <main class="seo-dash-wrap">
      <p class="eyebrow">Internal</p>
      <h1>SEO draft approval</h1>
      <p class="muted-note">
        Versioned saves: POST sends <code>{ version, items }</code> (CAS). On conflict the dashboard refetches once and retries.
        File on disk is authoritative; <code>version</code> increments on each successful save.
      </p>

      <section id="draft-list" aria-live="polite"></section>
      <p id="draft-empty" class="muted-note" hidden>No pending drafts.</p>
    </main>

    <div id="seo-modal" class="seo-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="seo-modal-title" hidden>
      <div class="seo-modal">
        <div class="seo-modal__head">
          <h2 id="seo-modal-title" style="margin: 0; font-size: 1.1rem">Draft preview</h2>
          <button type="button" class="btn btn-ghost" id="seo-modal-close">Close</button>
        </div>
        <div class="seo-modal__body">
          <pre id="seo-modal-pre"></pre>
        </div>
      </div>
    </div>

    <div class="seo-toast-host" id="seo-toast-host" aria-live="polite"></div>

    <script>
      (function () {
        function resolveSaveUrl() {
          return typeof window.__SEO_DRAFT_SAVE_URL__ === "string" && window.__SEO_DRAFT_SAVE_URL__
            ? window.__SEO_DRAFT_SAVE_URL__
            : "http://127.0.0.1:38421/save";
        }

        function normalizeDocVersion(data) {
          if (typeof data.version !== "number" || !Number.isFinite(data.version)) {
            data.version = 1;
          }
          return data;
        }

        /**
         * Single read model: default /drafts/pending-seo-pages.json?ts=… + cache: no-store.
         * Set window.__SEO_DRAFT_READ_URL__ to full base when JSON is not on the page origin.
         */
        async function fetchDrafts() {
          var base =
            typeof window.__SEO_DRAFT_READ_URL__ === "string" && window.__SEO_DRAFT_READ_URL__
              ? window.__SEO_DRAFT_READ_URL__.replace(/\?.*$/, "")
              : "/drafts/pending-seo-pages.json";
          var url = (base.indexOf("?") === -1 ? base + "?" : base + "&") + "ts=" + Date.now();
          console.log("[DRAFT-FETCH]", url);
          var r = await fetch(url, {
            cache: "no-store",
            headers: {
              "Cache-Control": "no-cache, no-store, must-revalidate",
              Pragma: "no-cache"
            }
          });
          if (!r.ok) {
            var errText = await r.text().catch(function () {
              return "";
            });
            throw new Error(errText || "Fetch failed " + r.status);
          }
          var data = await r.json();
          normalizeDocVersion(data);
          console.log("[DRAFT-FETCH] ok items=", Array.isArray(data.items) ? data.items.length : 0, "version=", data.version);
          return data;
        }

        /** Authoritative CAS version from last successful fetch / sync. */
        var currentVersion = 0;
        /** Only replaced from fetchDrafts / syncFromServer — never mutated for persistence. */
        var serverDoc = null;
        var persistInFlight = false;

        const listEl = document.getElementById("draft-list");
        const emptyEl = document.getElementById("draft-empty");
        const modal = document.getElementById("seo-modal");
        const modalPre = document.getElementById("seo-modal-pre");
        const modalClose = document.getElementById("seo-modal-close");
        const toastHost = document.getElementById("seo-toast-host");

        function showToast(message, isError) {
          var t = document.createElement("div");
          t.className = "seo-toast" + (isError ? " seo-toast--err" : "");
          t.textContent = message;
          toastHost.appendChild(t);
          window.setTimeout(function () {
            t.remove();
          }, 4200);
        }

        function badgeClass(status) {
          var s = String(status || "").toLowerCase();
          if (s === "approved") return "status-badge status-badge--approved";
          if (s === "rejected") return "status-badge status-badge--rejected";
          return "status-badge status-badge--pending";
        }

        function badgeLabel(status) {
          var s = String(status || "").toLowerCase();
          if (s === "approved") return "Approved";
          if (s === "rejected") return "Rejected";
          return "Pending";
        }

        function deepCloneDoc(doc) {
          if (typeof structuredClone === "function") return structuredClone(doc);
          return JSON.parse(JSON.stringify(doc));
        }

        /**
         * POST { version: currentVersion, items } — one automatic 409 retry after refetch + re-apply.
         */
        async function persistVersionedItems(itemsPayload, slug, nextStatus, isRetry) {
          var saveUrl = resolveSaveUrl();
          var body = JSON.stringify({ version: currentVersion, items: itemsPayload });
          console.log("[DRAFT-SAVE] client POST version=", currentVersion, "bytes=", body.length);
          var res = await fetch(saveUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body,
            cache: "no-store"
          });
          var text = await res.text().catch(function () {
            return "";
          });

          if (res.status === 409) {
            var j409 = {};
            try {
              j409 = JSON.parse(text);
            } catch (_) {}
            if (j409.error === "VERSION_CONFLICT") {
              if (!isRetry) {
                console.warn("[DRAFT-SAVE] VERSION_CONFLICT — auto recovery refetch");
                await syncFromServer();
                currentVersion = typeof serverDoc.version === "number" ? serverDoc.version : 1;
                var items2 = deepCloneDoc(serverDoc.items);
                var target2 = items2.find(function (it) {
                  return it.slug === slug;
                });
                if (!target2 || target2.status !== "pending") {
                  return { ok: false, error: "STALE", stale: true };
                }
                target2.status = nextStatus;
                return persistVersionedItems(items2, slug, nextStatus, true);
              }
              return { ok: false, error: "VERSION_CONFLICT", conflictRetryExhausted: true };
            }
            return { ok: false, error: j409.error || "Save rejected" };
          }

          if (!res.ok) {
            console.warn("[DRAFT-SAVE] client http error", res.status, text);
            return { ok: false, error: text || "Save failed" };
          }
          var j = {};
          try {
            j = JSON.parse(text);
          } catch (_) {}
          if (j && j.ok === false) {
            console.warn("[DRAFT-SAVE] client server rejected", j.error);
            return { ok: false, error: j.error || "Save failed" };
          }
          if (typeof j.version === "number" && Number.isFinite(j.version)) {
            currentVersion = j.version;
          }
          return { ok: true };
        }

        function render() {
          listEl.innerHTML = "";
          var doc = serverDoc;
          if (!doc || !Array.isArray(doc.items)) {
            console.log("[DRAFT-RENDER] empty (no document)");
            emptyEl.hidden = false;
            return;
          }

          var pending = doc.items.filter(function (i) {
            return i.status === "pending";
          });

          console.log("[DRAFT-RENDER] pending=", pending.length, "persistInFlight=", persistInFlight);

          if (!pending.length) {
            emptyEl.hidden = false;
            return;
          }
          emptyEl.hidden = true;

          pending.forEach(function (item) {
            var card = document.createElement("article");
            card.className = "seo-draft-card";
            card.dataset.slug = item.slug;

            var head = document.createElement("div");
            head.className = "seo-draft-card__head";

            var left = document.createElement("div");
            var h = document.createElement("h3");
            h.className = "seo-draft-card__title";
            h.textContent = item.title || "(no title)";
            var slugP = document.createElement("p");
            slugP.className = "seo-draft-card__slug";
            slugP.textContent = item.slug || "";

            var badge = document.createElement("span");
            badge.className = badgeClass(item.status);
            badge.textContent = badgeLabel(item.status);

            left.appendChild(h);
            left.appendChild(slugP);
            head.appendChild(left);
            head.appendChild(badge);

            var meta = document.createElement("p");
            meta.className = "muted-note";
            meta.style.margin = "0 0 0.5rem";
            meta.textContent = item.meta_description || "";

            var actions = document.createElement("div");
            actions.className = "seo-draft-card__actions";

            var disabled = persistInFlight;

            var btnPreview = document.createElement("button");
            btnPreview.type = "button";
            btnPreview.className = "btn btn-ghost";
            btnPreview.dataset.action = "preview";
            btnPreview.textContent = "Preview";
            btnPreview.disabled = disabled;

            var btnApprove = document.createElement("button");
            btnApprove.type = "button";
            btnApprove.className = "btn btn-primary";
            btnApprove.dataset.action = "approve";
            btnApprove.textContent = "Approve";
            btnApprove.disabled = disabled;

            var btnReject = document.createElement("button");
            btnReject.type = "button";
            btnReject.className = "btn btn-ghost";
            btnReject.dataset.action = "reject";
            btnReject.textContent = "Reject";
            btnReject.disabled = disabled;

            actions.appendChild(btnPreview);
            actions.appendChild(btnApprove);
            actions.appendChild(btnReject);

            card.appendChild(head);
            card.appendChild(meta);
            card.appendChild(actions);
            listEl.appendChild(card);
          });
        }

        async function syncFromServer() {
          console.log("[DRAFT-SYNC] begin");
          serverDoc = await fetchDrafts();
          currentVersion = typeof serverDoc.version === "number" ? serverDoc.version : 1;
          render();
          console.log("[DRAFT-SYNC] done version=", currentVersion);
        }

        function openModal(jsonText) {
          modalPre.textContent = jsonText;
          modal.hidden = false;
          modal.classList.add("is-open");
          modalClose.focus();
        }

        function closeModal() {
          modal.classList.remove("is-open");
          modal.hidden = true;
        }

        listEl.addEventListener("click", async function (ev) {
          var btn = ev.target.closest("button[data-action]");
          if (!btn || btn.disabled) return;
          var card = btn.closest(".seo-draft-card");
          if (!card) return;
          var slug = card.dataset.slug;
          var action = btn.dataset.action;

          var item =
            serverDoc && serverDoc.items
              ? serverDoc.items.find(function (it) {
                  return it.slug === slug;
                })
              : null;
          if (!item) return;

          if (action === "preview") {
            openModal(JSON.stringify(item, null, 2));
            return;
          }

          if (action === "approve" || action === "reject") {
            if (persistInFlight) return;
            var nextStatus = action === "approve" ? "approved" : "rejected";

            persistInFlight = true;
            render();

            try {
              console.log("[DRAFT-APPROVE]", slug, nextStatus);
              var latest = await fetchDrafts();
              normalizeDocVersion(latest);
              serverDoc = latest;
              currentVersion = latest.version;

              var itemsClone = deepCloneDoc(latest.items);
              var target = itemsClone.find(function (it) {
                return it.slug === slug;
              });
              if (!target || target.status !== "pending") {
                showToast("Draft list changed; synced from server.", true);
                render();
                return;
              }
              target.status = nextStatus;

              var result = await persistVersionedItems(itemsClone, slug, nextStatus, false);
              if (!result.ok) {
                if (result.conflictRetryExhausted) {
                  showToast("Could not save after conflict recovery.", true);
                } else if (result.stale) {
                  showToast("Draft list changed; synced from server.", true);
                } else {
                  showToast("Could not save. Is npm run seo-draft-server running?", true);
                }
                await syncFromServer();
                return;
              }
              await syncFromServer();
              showToast(action === "approve" ? "Draft approved" : "Draft rejected");
            } catch (e) {
              console.error("[DRAFT-APPROVE] error", e);
              showToast("Operation failed.", true);
              try {
                await syncFromServer();
              } catch (e2) {
                console.error("[DRAFT-SYNC] recovery fetch failed", e2);
              }
            } finally {
              persistInFlight = false;
              render();
            }
          }
        });

        modalClose.addEventListener("click", closeModal);
        modal.addEventListener("click", function (e) {
          if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && modal.classList.contains("is-open")) closeModal();
        });

        async function init() {
          try {
            await syncFromServer();
          } catch (e) {
            console.error("[DRAFT-FETCH] init error", e);
            showToast("Failed to load drafts (check URL and server).", true);
            emptyEl.hidden = false;
            emptyEl.textContent = "Could not load draft file.";
          }
        }

        init();
      })();
    </script>
  </body>
</html>
