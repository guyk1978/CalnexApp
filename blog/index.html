<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalnexApp Blog</title>
    <meta
      name="description"
      content="Read practical personal finance and borrowing guides from CalnexApp."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CalnexApp Blog" />
    <meta property="og:description" content="Guides and insights to support better financial decisions." />
    <meta property="og:url" content="https://calnexapp.com/blog/" />
    <link rel="canonical" href="https://calnexapp.com/blog/" />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a href="/" class="brand">CalnexApp</a>
        <nav class="menu">
          <a href="/" data-nav-link>Home</a>
          <a href="/tools/loan-calculator/" data-nav-link>Tools</a>
          <a href="/blog/" data-nav-link>Blog</a>
          <a href="/about/" data-nav-link>About</a>
          <a href="/contact/" data-nav-link>Contact</a>
        </nav>
      </div>
    </header>

    <main class="container section-space">
      <section class="page-title">
        <p class="eyebrow">Blog</p>
        <h1>CalnexApp Content Hub</h1>
        <p>In-depth loan strategy guides, calculators, and decision frameworks for smarter borrowing.</p>
      </section>

      <section class="blog-toolbar card">
        <input id="blogSearchInput" type="search" placeholder="Search guides..." aria-label="Search blog articles" />
        <div id="blogCategoryFilters" class="filter-chips" aria-label="Blog categories"></div>
      </section>

      <section>
        <h2>Featured Articles</h2>
        <div id="featuredBlogList" class="blog-grid featured-grid" aria-live="polite"></div>
      </section>

      <section>
        <h2>All Articles</h2>
        <div id="blogList" class="blog-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; <span id="year"></span> CalnexApp. All rights reserved.</p>
        <nav class="footer-links">
          <a href="/about/">About</a>
          <a href="/contact/">Contact</a>
          <a href="/blog/">Blog</a>
        </nav>
      </div>
    </footer>

    <script src="/assets/js/app.js" defer></script>
  </body>
</html>
